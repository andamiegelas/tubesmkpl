name: CI/CD Pipeline - Todo API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
──────

  #contiunes intregation

  #membuat procjet dan meverikasi depenecy nyya
  continuous-integration:
    name: "CI — Build & Install"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify project structure
        run: |
          echo "Checking required files..."
          test -f src/app.js       && echo "✅ src/app.js ada"
          test -f src/server.js    && echo "✅ src/server.js ada "
          test -f package.json     && echo "✅ package.json ada"

      - name: Cache node_modules for next jobs
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

#melakukan testing automation
#melakukan test terhadap tiap function 
  continuous-testing:
    name: "CT — Run Tests & Coverage"
    runs-on: ubuntu-latest
    needs: continuous-integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Check coverage thresholds
        run: |
          echo "melakkan test semua nya"
      



 
